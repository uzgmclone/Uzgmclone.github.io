<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🐥 FINAL CHICKENS "tantrum"</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic+Coding:wght@700&display=swap');
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #000; color: #fff; font-family: 'Nanum Gothic Coding', monospace; margin: 0; padding: 0; overflow: hidden; height: 100vh; width: 100vw; }
    .ff-box { background: linear-gradient(to bottom, #00008b, #000033); border: 2px solid #eee; border-radius: 5px; padding: 8px; }
    #game-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

    /* 전장 */
    #battle-field { height: 40vh; position: relative; background: linear-gradient(#1a2a6c, #000); display: flex; align-items: flex-end; justify-content: space-around; padding-bottom: 20px; border-bottom: 3px solid #fff; }
    .shake { animation: shakeAnim 0.2s; }
    @keyframes shakeAnim { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(5px,5px); } 50% { transform: translate(-5px,-5px); } 75% { transform: translate(5px,-5px); } }

    .sprite { font-size: 60px; transition: 0.2s; position: relative; }
    .player-side { transform: scaleX(-1); }
    .active-unit { filter: drop-shadow(0 0 15px #fff) scaleX(-1.2) translateY(-10px) !important; }
    .target-unit { filter: drop-shadow(0 0 15px #ff4444); animation: blink 0.4s infinite; }
    @keyframes blink { 50% { opacity: 0.4; } }

    /* UI 영역 */
    #ui-area { height: 60vh; background: #000; display: flex; flex-direction: column; padding: 5px; gap: 5px; }
    #status-bar { display: flex; gap: 5px; height: 100px; }
    .status-window { flex: 1; font-size: 11px; }
    .bar-bg { width: 100%; background: #333; height: 6px; margin: 2px 0; border-radius: 3px; }
    .hp-fill { height: 100%; background: #0f0; transition: 0.3s; }
    .mp-fill { height: 100%; background: #0af; transition: 0.3s; }

    #command-bar { display: flex; gap: 5px; flex: 1; overflow: hidden; }
    #menu-container { flex: 1.5; position: relative; display: flex; align-items: center; overflow: hidden; }
    #menu-list { display: flex; transition: 0.3s; height: 100%; width: 100%; }
    .menu-page { min-width: 100%; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 5px; padding: 2px; }
    
    .nav-btn { position: absolute; z-index: 20; background: rgba(0,0,139,0.9); color: white; border: 1px solid #fff; padding: 12px 6px; cursor: pointer; }
    #log-window { flex: 1; font-size: 11px; overflow-y: auto; background: rgba(0,0,50,0.5); }
    
    button.skill-btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid #444; font-size: 11px; cursor: pointer; padding: 5px; }
    button.ult-btn { border-color: #ff0; color: #ff0; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }

    .damage-pop { position: absolute; font-weight: bold; text-shadow: 2px 2px #000; animation: floatUp 0.8s forwards; z-index: 100; pointer-events: none; }
    @keyframes floatUp { from{opacity:1; transform:translateY(0);} to{opacity:0; transform:translateY(-60px);} }

    #select-screen { position: absolute; inset: 0; background: #000; z-index: 2000; padding: 15px; display: flex; flex-direction: column; }
    .char-item { margin-bottom: 5px; padding: 10px; cursor: pointer; border: 2px solid #444; }
    .selected { border-color: #ff0; background: #111; }
  </style>
</head>
<body>

<div id="game-container">
  <div id="select-screen">
    <h2 style="color: #ffeb3b; text-align: center;">🛡️ 원정대 결성 (2인) ⚔️</h2>
    <div id="char-list" style="flex:1; overflow-y:auto;"></div>
    <button id="start-btn" class="ff-box" style="width:100%; color:white; display:none; padding:15px;" onclick="startBattle()">전투 개시</button>
  </div>

  <div id="battle-field">
    <div class="unit-container" id="player-party"></div>
    <div class="unit-container" id="enemy-party"></div>
  </div>

  <div id="ui-area">
    <div id="status-bar">
      <div id="p1-status" class="ff-box status-window"></div>
      <div id="p2-status" class="ff-box status-window"></div>
    </div>
    <div class="ff-box" style="display:flex; justify-content:space-between; font-size:12px; align-items:center;">
      <span>🎒 물약: <b id="pot-count">3</b>개</span>
      <button class="ff-box" id="use-pot-btn" style="color:white; cursor:pointer;" onclick="gameState.usePotion()">물약 사용(HP+150)</button>
    </div>
    <div id="command-bar">
      <div id="menu-container" class="ff-box">
        <button class="nav-btn" style="left:0" onclick="gameState.movePage(-1)">◀</button>
        <div id="menu-list"></div>
        <button class="nav-btn" style="right:0" onclick="gameState.movePage(1)">▶</button>
      </div>
      <div id="log-window" class="ff-box"></div>
    </div>
  </div>
</div>

<script>
  // ============================================
  // 캐릭터 데이터 정의
  // ============================================
  const charDB = [
    { name:"기사 병아리", img:"🐥", hp:250, mp:100, atk:30, skills:[
        {n:"평타",p:1,m:0}, {n:"방패찍기",p:1.4,m:15}, {n:"박치기",p:1.5,m:20}, 
        {n:"필살: 대참격",p:3.0,m:40}, {n:"필살: 근육폭발",p:3.5,m:50}, {n:"궁극: 황금계란",p:7.0,m:100,u:true}
    ]},
    { name:"도사 펭귄", img:"🐧", hp:160, mp:150, atk:55, skills:[
        {n:"요들송",p:1,m:0}, {n:"신념유지",p:1.2,m:2}, {n:"도사의 품격",p:10,m:35}, 
        {n:"필살: 부리 쪼기",p:4.5,m:60}, {n:"필살: 배치기",p:5.0,m:70}, {n:"궁극: 소리 지르기",p:9.0,m:150,u:true}
    ]},
    { name:"독수리 참_뚝배기", img:"🦅", hp:200, mp:100, atk:45, skills:[
        {n:"쨉",p:1.1,m:0}, {n:"연속차기",p:1.8,m:20}, {n:"기습",p:2.0,m:25}, 
        {n:"필살: 뺨 때리기",p:4.2,m:50}, {n:"필살: 유혹",p:4.8,m:65}, {n:"궁극: 폭탄 폭격",p:8.0,m:100,u:true}
    ]},
    { name:"참새 닌자", img:"🐦", hp:180, mp:110, atk:40, skills:[
        {n:"부리찌르기",p:1,m:0}, {n:"박치기",p:2.0,m:25}, {n:"파닥거리기",p:1.6,m:15}, 
        {n:"필살: 암살",p:4.5,m:55}, {n:"필살: 친구 소환",p:5.0,m:70}, {n:"궁극: 친구 300마리 호출",p:7.5,m:110,u:true}
    ]},
    { name:"부엉이 신선", img:"🦉", hp:200, mp:130, atk:35, skills:[
        {n:"바람",p:1,m:0}, {n:"침 주기",p:2.2,m:30}, {n:"눈 터트리기",p:2.0,m:28}, 
        {n:"필살: 태풍",p:4.0,m:50}, {n:"필살: 최면",p:5.0,m:75}, {n:"궁극: 지혜의빛",p:8.5,m:130,u:true}
    ]},
    { name:"알에서 나와 세상을 너무 일찍 마주한 아기 병아리", img:"🐣", hp:50, mp:140, atk:65, skills:[
        {n:"껍질 던지기",p:1,m:0}, {n:"껍질 주기",p:2.2,m:30}, {n:"눈 터트리기",p:2.0,m:28}, 
        {n:"필살: 괴성 발사",p:4.0,m:50}, {n:"필살: 아기계",p:5.0,m:75}, {n:"궁극: 쫑알쫑알",p:12.5,m:130,u:true}
    ]}
    { name:"너무나도 몸이 튼튼해서 조류전쟁때 최전방 탱커를 맡아서 몸이 더 강화된 티라노사우루스 와이라노상방뇨", img:"🦖", hp:750, mp:100, atk:5, skills:[
        {n:"박치기",p:1,m:0}, {n:"소리지르기",p:2.2,m:30}, {n:"밟기",p:2.0,m:28}, 
        {n:"필살: 돌진",p:4.0,m:50}, {n:"필살: 꼬리치기",p:5.0,m:75}, {n:"궁극: 난장판 만들기",p:40.5,m:100,u:true}
    ]}
  { name:"너무나도 몸이 뜨거워서 알도 너무나도 뜨거워 주변을 다 태워버릴 정도로 너무나도 뜨거워서 자신의 깃털마저 불에 내성이 생겨버려서 너무나도 강력해진 불사조 앗뜨거 ", img:"🐦‍🔥", hp:170, mp:200, atk:25, skills:[
        {n:"불 뿌리기",p:1.5,m:0}, {n:"화참격",p:2.2,m:75}, {n:"밟기",p:2.0,m:110}, 
        {n:"필살: 주변을 다 태워버리기",p:3.0,m:130}, {n:"필살: 너무나도 뜨거운 알 던지기",p:5.0,m:155}, {n:"궁극:  불 태우기",p:10.5,m:200,u:true}
    ]}
  ];

  // ============================================
  // 게임 상태 객체 (전역 상태 관리)
  // ============================================
  const gameState = {
    myParty: [],
    enemies: [],
    selectedIds: [],
    turnIdx: 0,
    stage: 1,
    curPage: 0,
    currentSkill: null,
    currentAttacker: null,
    potionCount: 3,
    
    // ===== UI 업데이트 =====
    updateUI() {
      
      this.myParty.forEach((m, i) => {
        const statusEl = document.getElementById(`p${i+1}-status`);
        if(statusEl) {
          const hP = (m.curHp / m.hp) * 100;
          const mP = (m.curMp / m.mp) * 100;
          statusEl.innerHTML = `
            <b>${m.name}</b><br>
            HP:${m.curHp}/${m.hp}
            <div class="bar-bg"><div class="hp-fill" style="width:${hP}%"></div></div>
            MP:${m.curMp}/${m.mp}
            <div class="bar-bg"><div class="mp-fill" style="width:${mP}%"></div></div>
          `;
        }
        document.getElementById(`p-${i}`).style.opacity = m.curHp <= 0 ? '0.2' : '1';
      });
      
      this.enemies.forEach((m, i) => {
        document.getElementById(`e-${i}`).style.opacity = m.curHp <= 0 ? '0' : '1';
      });
      
      
      document.getElementById('pot-count').innerText = this.potionCount;
      
      
      const useBtn = document.getElementById('use-pot-btn');
      if(this.currentAttacker) {
        if(this.currentAttacker.side === 'p' && this.potionCount > 0) {
          useBtn.disabled = false;
          useBtn.style.opacity = '1';
        } else {
          useBtn.disabled = true;
          useBtn.style.opacity = '0.3';
        }
      }
    },
    
    // ===== 턴 시스템 =====
    nextTurn() {
      if(this.checkEnd()) return;
      
      
      const allUnits = [...this.myParty, ...this.enemies];
      const aliveUnits = allUnits.filter(u => u.curHp > 0);
      
      if(aliveUnits.length === 0) {
        this.log("모든 유닛이 사라졌습니다!");
        return;
      }
      
     
      this.currentAttacker = aliveUnits[this.turnIdx % aliveUnits.length];
      
      // UI 업데이트
      document.querySelectorAll('.sprite').forEach(s => s.classList.remove('active-unit'));
      const sId = this.currentAttacker.side === 'p' 
        ? `p-${this.myParty.indexOf(this.currentAttacker)}` 
        : `e-${this.enemies.indexOf(this.currentAttacker)}`;
      
      const sprite = document.getElementById(sId);
      if(sprite) sprite.classList.add('active-unit');
      
      // 턴 실행
      if(this.currentAttacker.side === 'e') {
        setTimeout(() => this.enemyAI(this.currentAttacker), 1000);
      } else {
        this.currentAttacker.curMp = Math.min(this.currentAttacker.mp, this.currentAttacker.curMp + 10);
        this.updateUI();
        this.showSkillPages(this.currentAttacker);
      }
    },
    
    // ===== 스킬 선택 =====
    showSkillPages(unit) {
      const list = document.getElementById('menu-list');
      list.innerHTML = '';
      this.curPage = 0;
      list.style.transform = 'translateX(0)';
      
      
      for(let i = 0; i < unit.skills.length; i += 4) {
        const page = document.createElement('div');
        page.className = 'menu-page';
        
        unit.skills.slice(i, i + 4).forEach(s => {
          const btn = document.createElement('button');
          btn.className = `skill-btn ff-box ${s.u ? 'ult-btn' : ''}`;
          btn.innerHTML = `${s.n}<br><small>MP:${s.m}</small>`;
          btn.disabled = unit.curMp < s.m;
          btn.onclick = () => this.selectSkill(s, unit);
          page.appendChild(btn);
        });
        
        list.appendChild(page);
      }
    },
    
    selectSkill(s, unit) {
      this.currentSkill = s;
      this.log(`대상을 선택! [${s.n}]`);
      document.querySelectorAll('#enemy-party .sprite').forEach(el => {
        const idx = parseInt(el.id.split('-')[1]);
        if(this.enemies[idx].curHp > 0) {
          el.classList.add('target-unit');
        }
      });
    },
    
    // ===== 공격 =====
    attackTarget(target) {
      const attacker = this.currentAttacker; 
      
      if(!attacker || !this.currentSkill) return;
      
      attacker.curMp -= this.currentSkill.m;
      
      // 데미지 계산
      const DMG_VAR_MIN = 0.9;
      const DMG_VAR_MAX = 1.2;
      let dmg = Math.floor(attacker.atk * this.currentSkill.p * (DMG_VAR_MIN + Math.random() * (DMG_VAR_MAX - DMG_VAR_MIN)));
      
      // 공격 애니메이션
      const sId = `p-${this.myParty.indexOf(attacker)}`;
      const battleField = document.getElementById('battle-field');
      const sprite = document.getElementById(sId);
      
      if(sprite) sprite.classList.add('shake');
      if(battleField) battleField.classList.add('shake');
      
      setTimeout(() => {
        document.querySelectorAll('.shake').forEach(el => el.classList.remove('shake'));
      }, 200);
      
      // 데미지 적용
      target.curHp = Math.max(0, target.curHp - dmg);
      this.showPop(target, dmg, this.currentSkill.u ? "#ff0" : "#fff", this.currentSkill.u ? 50 : 30);
      this.log(`${attacker.name}의 ${this.currentSkill.n}! ${dmg} 피해!`);
      
      // 초기화
      this.currentSkill = null;
      document.querySelectorAll('.sprite').forEach(s => s.classList.remove('target-unit'));
      
      this.finishTurn();
    },
    
    // ===== 포션 사용 =====
    usePotion() {
      if(this.potionCount <= 0) {
        this.log("포션이 부족해!");
        return;
      }
      
      const unit = this.currentAttacker;  // 
      
      if(unit.side !== 'p') {
        this.log("플레이어 턴에만 사용 가능!");
        return;
      }
      
      this.potionCount--;
      unit.curHp = Math.min(unit.hp, unit.curHp + 150);
      this.log(`포션 사용! ${unit.name} HP +150 회복!`);
      this.showPop(unit, 150, "#0f0", 35);
      this.updateUI();
      
      this.finishTurn();
    },
    
    // ===== 적 AI =====
    enemyAI(unit) {
      const targets = this.myParty.filter(p => p.curHp > 0);
      if(targets.length === 0) {
        this.finishTurn();
        return;
      }
      
      const target = targets[Math.floor(Math.random() * targets.length)];
      let dmg = Math.floor(unit.atk * (0.8 + Math.random() * 0.4));
      target.curHp = Math.max(0, target.curHp - dmg);
      
      this.showPop(target, dmg, "#f55", 30);
      this.log(`${unit.name}의 반격! ${dmg} 피해!`);
      
      this.finishTurn();
    },
    
    // ===== 턴 종료 =====
    finishTurn() {
      this.turnIdx++;
      this.updateUI();
      setTimeout(() => this.nextTurn(), 700);
    },
    
    // ===== 팝업 효과 =====
    showPop(u, v, c, s) {
      const id = u.side === 'p' ? `p-${this.myParty.indexOf(u)}` : `e-${this.enemies.indexOf(u)}`;
      const sprite = document.getElementById(id);
      if(!sprite) return;
      
      const r = sprite.getBoundingClientRect();
      const p = document.createElement('div');
      p.className = 'damage-pop';
      p.innerText = v;
      p.style.color = c;
      p.style.fontSize = s + 'px';
      p.style.left = r.left + 'px';
      p.style.top = r.top + 'px';
      
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 800);
    },
    
    // ===== 페이지 이동 =====
    movePage(d) {
      const list = document.getElementById('menu-list');
      const total = list.children.length;
      this.curPage = (this.curPage + d + total) % total;
      list.style.transform = `translateX(-${this.curPage * 100}%)`;
    },
    
    // ===== 로그 =====
    log(m) {
      const win = document.getElementById('log-window');
      win.innerHTML += `> ${m}<br>`;
      win.scrollTop = win.scrollHeight;
    },
    
    // ===== 게임 끝 확인 =====
    checkEnd() {
      if(this.myParty.every(p => p.curHp <= 0)) {
        alert("모두 손질되었음...");
        location.reload();
        return true;
      }
      
      if(this.enemies.every(e => e.curHp <= 0)) {
        this.stage++;
        alert(`상대 손질 끝! STAGE ${this.stage}로 돌진!!!`);
        
        this.potionCount++;
        document.getElementById('pot-count').innerText = this.potionCount;
        
        
        this.myParty.forEach(p => {
          p.hp += 20;
          p.atk += 10;
          p.curHp = p.hp;
          p.curMp = p.mp;
        });
        
        this.turnIdx = 0;
        this.currentSkill = null;
        this.currentAttacker = null;
        
        this.loadStage();
        return true;
      }
      
      return false;
    },
    
    // ===== 스테이지 로드 =====
    loadStage() {
      this.enemies = [];
      const eImgs = ["🐣", "🐤", "🦜", "🦆", "🪿", "🦃", "🦢", "🐦‍⬛", "🦤", "🐦", "🦖", "🦕"];
      
      for(let i = 0; i < 2; i++) {
        let hp = 70 + (this.stage * 350);
        this.enemies.push({
          name: `Lv.${this.stage} 적`,
          img: eImgs[Math.min(this.stage - 1, eImgs.length - 1)],
          hp: hp,
          curHp: hp,
          atk: 10 + (this.stage * 18),
          side: 'e',
          id: i
        });
      }
      
      this.renderSprites();
      this.updateUI();
      this.log(`--- STAGE ${this.stage} 시작 ---`);
      this.nextTurn();
    },
    
    // ===== 스프라이트 렌더 =====
    renderSprites() {
      const pBox = document.getElementById('player-party');
      const eBox = document.getElementById('enemy-party');
      pBox.innerHTML = '';
      eBox.innerHTML = '';
      
      this.myParty.forEach((m, i) => {
        const s = document.createElement('div');
        s.className = 'sprite player-side';
        s.id = `p-${i}`;
        s.innerText = m.img;
        pBox.appendChild(s);
      });
      
      this.enemies.forEach((m, i) => {
        const s = document.createElement('div');
        s.className = 'sprite';
        s.id = `e-${i}`;
        s.innerText = m.img;
        s.onclick = () => {
          if(this.currentSkill && m.curHp > 0) {
            this.attackTarget(m);
          }
        };
        eBox.appendChild(s);
      });
    }
  };

  // ============================================
  // 초기화
  // ============================================
  const listEl = document.getElementById('char-list');
  charDB.forEach((c, i) => {
    const d = document.createElement('div');
    d.className = 'char-item ff-box';
    d.innerHTML = `<b>${c.img} ${c.name}</b><br>HP:${c.hp} MP:${c.mp} ATK:${c.atk}`;
    d.onclick = () => {
      if(gameState.selectedIds.includes(i)) {
        gameState.selectedIds = gameState.selectedIds.filter(v => v !== i);
        d.classList.remove('selected');
      } else if(gameState.selectedIds.length < 2) {
        gameState.selectedIds.push(i);
        d.classList.add('selected');
      }
      document.getElementById('start-btn').style.display = gameState.selectedIds.length === 2 ? 'block' : 'none';
    };
    listEl.appendChild(d);
  });

  // ============================================
  // 게임 시작
  // ============================================
  function startBattle() {
    gameState.myParty = gameState.selectedIds.map(id => ({
      ...charDB[id],
      curHp: charDB[id].hp,
      curMp: charDB[id].mp,
      side: 'p'
    }));
    
    document.getElementById('select-screen').style.display = 'none';
    gameState.loadStage();
  }
</script>
