<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>zgm Game Studio</title>
  <style>
    /* 1. 디자인 베이스 */
    :root {
      --bg: #fdf5e6;
      --dog-brown: #c9b4a1;
      --nose-black: #1a1a1a;
      --highlight: #ff6b6b;
    }

    body {
      background: var(--bg);
      font-family: 'Pretendard', sans-serif;
      margin: 0; padding: 40px 20px;
      display: flex; flex-direction: column; align-items: center;
    }

    .header { text-align: center; margin-bottom: 30px; }
    
    /* 🔍 검색 바 스타일 */
    .search-container {
      width: 100%;
      max-width: 500px;
      margin-bottom: 50px;
      position: relative;
    }

    #search-input {
      width: 100%;
      padding: 15px 25px;
      font-size: 1.1rem;
      border: 4px solid var(--dog-brown);
      border-radius: 50px;
      outline: none;
      background: white;
      box-sizing: border-box;
      transition: 0.3s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    #search-input:focus {
      border-color: var(--nose-black);
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    .search-icon {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      pointer-events: none;
    }

    /* 2. 게임 카드 그리드 */
    #game-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
      width: 100%;
      max-width: 1100px;
    }

    /* 3. 공통 모듈 스타일 */
    .card {
      background: rgba(255,255,255,0.8);
      border: 5px solid var(--dog-brown);
      border-radius: 40px;
      padding: 30px;
      text-align: center;
      transition: 0.3s;
      display: flex; flex-direction: column; justify-content: space-between;
    }

    .card.hidden { display: none; } /* 검색 필터링용 */

    .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    .icon { font-size: 4rem; margin-bottom: 10px; }
    .title { font-size: 1.4rem; font-weight: 800; color: #5d4037; }
    .desc { font-size: 0.9rem; color: #8d6e63; margin: 15px 0 25px; line-height: 1.4; }

    /* 4. 코 버튼 */
    .btn {
      background: var(--nose-black);
      color: white; text-decoration: none;
      padding: 15px; border-radius: 50px;
      font-weight: bold; transition: 0.2s;
      box-shadow: 0 5px 0 #000;
    }

    .btn:hover { transform: scale(1.05); filter: brightness(1.2); }

    /* 결과 없음 메시지 */
    #no-result {
      display: none;
      text-align: center;
      color: #8d6e63;
      margin-top: 50px;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>

  <header class="header">
    <h1>🐶 mini games</h1>
    <p>찾고 싶은 게임을 검색해봐!</p>
  </header>

  <div class="search-container">
    <input type="text" id="search-input" placeholder="게임 제목을 입력하세요...">
    <span class="search-icon">🔍</span>
  </div>

  <main id="game-list"></main>
  
  <div id="no-result">찾으시는 게임이 없나봐요... 멍! 🐾</div>

  <script>
    const games = [
      { title: "파이널 치킨즈", icon: "🐥", desc: "본격 턴제 게임<br>조류의 전설이 되어 티라노를 뚜드려 패버리자!", link: "FINAL_CHICKEN.html", color: "#ffeb3b" },
      { title: "치킨런", icon: "🐣", desc: "옆에 치킨 시키고<br>플레이 하기", link: "chicken_run.html", color: "#12A1B5B6" },
      { title: "총기 반동제어 훈련장", icon: "🔫", desc: "옆에 친구 버리고<br>플레이 하기", link: "gun.html", color: "#12A1B9B6" },
      { title: "닭런", icon: "🐓", desc: "치킨 먹으며<br>플레이 하기", link: "chicken2run.html", color: "#12A1B470" }

    ];
    //{ title: "에어하키", icon: "🏒", desc: "옆에 친구랑<br>플레이 하기", link: "Air_hockey.html", color: "#1BD1B3B3" }

    const listContainer = document.getElementById('game-list');
    const searchInput = document.getElementById('search-input');
    const noResult = document.getElementById('no-result');
    
    // 초기 렌더링
    function renderGames() {
      listContainer.innerHTML = '';
      games.forEach(game => {
        const card = document.createElement('article');
        card.className = 'card';
        card.dataset.title = game.title; // 검색용 데이터
        card.style.borderColor = game.color;
        
        card.innerHTML = `
          <div class="icon">${game.icon}</div>
          <h2 class="title">${game.title}</h2>
          <p class="desc">${game.desc}</p>
          <a href="${game.link}" class="btn">플레이하기</a>
        `;
        listContainer.appendChild(card);
      });
    }

    // 실시간 검색 로직
    searchInput.addEventListener('input', (e) => {
      const keyword = e.target.value.toLowerCase();
      const cards = document.querySelectorAll('.card');
      let visibleCount = 0;

      cards.forEach(card => {
        const title = card.dataset.title.toLowerCase();
        if (title.includes(keyword)) {
          card.classList.remove('hidden');
          visibleCount++;
        } else {
          card.classList.add('hidden');
        }
      });

      // 결과 없을 때 처리
      noResult.style.display = visibleCount === 0 ? 'block' : 'none';
    });

    renderGames();
  </script>

</body>
</html>
