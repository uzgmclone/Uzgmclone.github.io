<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> 패치노트(odd cap) 🐾</title>
  <style>
    :root {
      --bg: #f9f3ee;
      --dog-brown: #c9b4a1;
      --nose-black: #1a1a1a;
      --point-red: #fd6f61;
      --paper-white: #ffffff;
    }

    body {
      margin: 0; padding: 0;
      min-height: 100vh;
      display: flex; justify-content: center; align-items: center;
      background: var(--bg);
      font-family: 'Pretendard', sans-serif;
    }

    /* 패치노트 전용 박스 */
    .update-container {
      width: 90%;
      max-width: 500px;
      background: var(--paper-white);
      border: 4px dashed var(--dog-brown); /* 귀여운 점선 테두리 */
      border-radius: 40px;
      padding: 40px 25px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.05);
      position: relative;
    }

    h1 {
      color: #5d4037;
      font-size: 1.8rem;
      margin-top: 0;
      text-align: center;
    }

    .version-tag {
      background: var(--point-red);
      color: white;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.9rem;
      display: inline-block;
      margin-bottom: 20px;
    }

    /* 패치 내용 리스트 */
    .update-list {
      text-align: left;
      background: #fffaf5;
      padding: 20px;
      border-radius: 20px;
      margin-bottom: 30px;
      list-style: none;
    }

    .update-list li {
      margin-bottom: 15px;
      color: #6d4c41;
      font-size: 1rem;
      display: flex;
      align-items: flex-start;
    }

    .update-list li::before {
      content: '🐾';
      margin-right: 10px;
    }

    /* 돌아가기 버튼 */
    .back-btn {
      display: inline-block;
      text-decoration: none;
      background: var(--dog-brown);
      color: white;
      padding: 15px 40px;
      border-radius: 30px;
      font-weight: 700;
      transition: 0.2s;
    }

    .back-btn:hover {
      background: #b8a08d;
      transform: scale(1.02);
    }

    .footer-dog {
      font-size: 0.8rem;
      color: #c9b4a1;
      margin-top: 20px;
      text-align: center;
    }
  </style>
</head>
<body>

  <main class="update-container">
    <div style="text-align: center;">
      <span class="version-tag">v1.47a1</span>
    </div>
    
    <h1> 오늘의 패치노트 📜(현재 최신버전은 v1.51버전임을 알림)</h1>

    <ul class="update-list">
      <li> 업데이트와 다운로드는 디스코드에서(곧 유료전향예정)</li>
      <li> 최신버전이 아니므로 호환성 문제가 있을 수 있음 <li>
      <li>소각장 추가</li>
      <li> 디스코드업데이트확인은 여기서 https://discord.gg/A2NEA9jfM </li>
    </ul>

    <div style="text-align: center;">
      <a href="index.html" class="back-btn">메인으로 돌아가기</a>
      <p class="footer-dog">© zgm Studio</p>
    </div>
  </main>

</body>
</html>
