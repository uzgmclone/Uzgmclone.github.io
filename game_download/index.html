<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>zgm Studio - beta version Game_Download</title>
  <style>
    :root {
      --bg: #f9f3ee;
      --dog-brown: #c9b4a1;
      --nose-black: #1a1a1a;
      --point-red: #fd6f61; 
      --patch-blue: #7baaf7; /* 패치노트용 시원한 색상 추가 */
    }

    body {
      margin: 0; padding: 0;
      min-height: 100vh;
      display: flex; justify-content: center; align-items: center;
      background: var(--bg);
      font-family: 'Pretendard', sans-serif;
    }

    .download-box {
      width: 90%;
      max-width: 450px;
      background: white;
      border: 6px solid var(--dog-brown);
      border-radius: 60px;
      padding: 60px 30px;
      text-align: center;
      box-shadow: 0 30px 60px rgba(165, 140, 120, 0.2);
      position: relative;
    }

    .download-box::before, .download-box::after {
      content: '';
      position: absolute;
      top: -40px;
      width: 80px; height: 100px;
      background: var(--dog-brown);
      border-radius: 50% 50% 10% 10%;
      z-index: -1;
    }
    .download-box::before { left: 40px; transform: rotate(-20deg); }
    .download-box::after { right: 40px; transform: rotate(20deg); }

    .icon-area {
      font-size: 5rem;
      margin-bottom: 20px;
      animation: bounce 2s infinite;
    }

    h1 {
      color: #5d4037;
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .info-text {
      color: #a1887f;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    /* 버튼 공통 스타일 */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 15px; /* 버튼 사이 간격 */
      align-items: center;
    }

    .base-btn {
      display: inline-block;
      text-decoration: none;
      color: white;
      padding: 18px 30px;
      font-size: 1.1rem;
      font-weight: 900;
      border-radius: 50px;
      transition: all 0.2s;
      width: 80%; /* 버튼 너비 맞춤 */
    }

    /* 다운로드 버튼 */
    .download-btn {
      background: var(--nose-black);
      box-shadow: 0 6px 0 #000;
    }

    /* 패치노트 버튼 */
    .patch-btn {
      background: var(--point-red);
      box-shadow: 0 6px 0 #c04e44;
    }

    .base-btn:hover {
      transform: scale(1.05) translateY(-3px);
      filter: brightness(1.2);
    }

    .base-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.5);
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
  </style>
</head>
<body>

  <main class="download-box">
    <div class="icon-area">🎁</div>
    <h1>게임다운로드!</h1>
    <p class="info-text">
      댕댕이가 말아주는 게임<br>
      아래 버튼을 누르면 즉시 포장해줌! 🐾
    </p>
    
    <div class="btn-group">
      <a href="https://github.com/uzgm/Uzgm.github.io/releases/download/Beta_version/oven_bound_v1.53 package" class="base-btn download-btn">
        댕댕이에게 선물받기 🐾
      </a>

      <a href="update.html" class="base-btn patch-btn">
        패치노트 보기 📜
      </a>
    </div>
  </main>

</body>
</html>
